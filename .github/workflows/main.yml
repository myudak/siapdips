name: Deploy Browser Extensions

on:
  workflow_dispatch:
  push:
    branches:
      - main # Adjust if needed

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]') || contains(github.event.head_commit.message, '[release]') # Manual and [deploy] publish stores; [release] only creates release assets.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies & Build
        run: |
          echo "Installing dependencies..."
          npm install --legacy-peer-deps
          echo "Building extension..."
          NODE_ENV=production npm run build

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Prepare Release Metadata
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          ASSET_NAME="siapdips-${TAG}.crx"
          FIREFOX_ASSET_NAME="siap-dips-firefox-${TAG}.zip"
          SOURCE_ASSET_NAME="siap-dips-source-${TAG}.zip"
          FIREFOX_ADDON_GUID=$(node -p "require('./src/manifest-firefox.json').browser_specific_settings.gecko.id")

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
          echo "firefox_asset_name=${FIREFOX_ASSET_NAME}" >> "$GITHUB_OUTPUT"
          echo "source_asset_name=${SOURCE_ASSET_NAME}" >> "$GITHUB_OUTPUT"
          echo "firefox_addon_guid=${FIREFOX_ADDON_GUID}" >> "$GITHUB_OUTPUT"

      - name: Pack CRX
        run: |
          trap 'rm -f dist.pem' EXIT
          install -m 600 /dev/null dist.pem
          printf '%s' '${{ secrets.CRX_PRIVATE_KEY }}' > dist.pem
          test -s dist.pem

          "${{ steps.setup-chrome.outputs.chrome-path }}" --no-sandbox --pack-extension=dist --pack-extension-key=dist.pem
          mv dist.crx "${{ steps.release.outputs.asset_name }}"

      - name: Install Chrome Web Store CLI
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
        run: npm install -g chrome-webstore-upload-cli

      - name: Upload to Chrome Web Store
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
        run: |
          echo "Uploading extension..."
          chrome-webstore-upload upload --source dist \
            --extension-id ${{ secrets.EXTENSION_ID }} \
            --client-id ${{ secrets.CLIENT_ID }} \
            --client-secret ${{ secrets.CLIENT_SECRET }} \
            --refresh-token ${{ secrets.REFRESH_TOKEN }}

      - name: Build Firefox Package
        run: |
          npm run build:firefox
          node scripts/package-extension.mjs firefox --no-build
          mv "release/siap-dips-firefox-v${{ steps.release.outputs.version }}.zip" \
            "${{ steps.release.outputs.firefox_asset_name }}"

      - name: Package Source for Mozilla Review
        run: |
          git archive \
            --format=zip \
            --output="${{ steps.release.outputs.source_asset_name }}" \
            HEAD \
            -- . \
            ":(exclude)dist.crx" \
            ":(exclude)dist.pem" \
            ":(exclude)dist.zip"

      - name: Publish to Firefox Add-ons
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
        uses: wdzeng/firefox-addon@v1.2.1
        with:
          addon-guid: ${{ steps.release.outputs.firefox_addon_guid }}
          xpi-path: ${{ steps.release.outputs.firefox_asset_name }}
          source-file-path: ${{ steps.release.outputs.source_asset_name }}
          jwt-issuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwt-secret: ${{ secrets.FIREFOX_JWT_SECRET }}
          approval-notes: |
            Build instructions are provided in FIREFOX_BUILD_INSTRUCTIONS.md.
            Run `npm install --legacy-peer-deps`, then `npm run build:firefox`.
            The generated extension is written to `dist/`.

      - name: Upload Browser Packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          files: |
            ${{ steps.release.outputs.asset_name }}
            ${{ steps.release.outputs.firefox_asset_name }}
            ${{ steps.release.outputs.source_asset_name }}
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Publish Extension
      #   run: |
      #     echo "Publishing extension..."
      #     chrome-webstore-upload publish \
      #       --extension-id ${{ secrets.EXTENSION_ID }} \
      #       --client-id ${{ secrets.CLIENT_ID }} \
      #       --client-secret ${{ secrets.CLIENT_SECRET }} \
      #       --refresh-token ${{ secrets.REFRESH_TOKEN }}
